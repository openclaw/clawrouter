name = "clawrouter-edge"
main = "crates/edge/build/index.js"
compatibility_date = "2026-06-05"
keep_vars = true

[build]
command = "npm --prefix admin run build && cargo install -q worker-build --version 0.8.3 && ${HOME}/.cargo/bin/worker-build --release crates/edge"

[[queues.producers]]
binding = "USAGE_QUEUE"
queue = "clawrouter-usage"

[[queues.consumers]]
queue = "clawrouter-usage"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 5

[[durable_objects.bindings]]
name = "BUDGET_LEDGER"
class_name = "BudgetLedgerObject"

[[durable_objects.bindings]]
name = "USAGE_LEDGER"
class_name = "UsageLedgerObject"

[[durable_objects.bindings]]
name = "BINDING_INDEX"
class_name = "PolicyBindingIndexObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BudgetLedgerObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UsageLedgerObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PolicyBindingIndexObject"]

[[routes]]
pattern = "clawrouter.openclaw.ai"
custom_domain = true

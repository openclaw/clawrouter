name = "clawrouter-edge"
main = "crates/edge/build/index.js"
compatibility_date = "2026-06-05"

[build]
command = "cargo install -q worker-build --version 0.8.3 && ${HOME}/.cargo/bin/worker-build --release crates/edge"

[[queues.producers]]
binding = "USAGE_QUEUE"
queue = "clawrouter-usage"

[[durable_objects.bindings]]
name = "BUDGET_LEDGER"
class_name = "BudgetLedgerObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BudgetLedgerObject"]

[[routes]]
pattern = "clawrouter.openclaw.ai"
custom_domain = true

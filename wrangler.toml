name = "clawrouter-edge"
main = "crates/edge/build/worker/shim.mjs"
compatibility_date = "2026-06-05"

[build]
command = "cargo install -q worker-build --version 0.8.3 && ${HOME}/.cargo/bin/worker-build --release crates/edge"

[[queues.producers]]
binding = "USAGE_QUEUE"
queue = "clawrouter-usage"

[[kv_namespaces]]
binding = "POLICY_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

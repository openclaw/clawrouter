schema: clawrouter.service-provider.v1
id: slack
displayName: Slack
status: experimental
class: oauth_rest_json
service:
  platform: slack
  kind: oauth_platform
  upstreamService: slack
  oauthProvider: slack
auth:
  schemes:
    - type: oauth
      provider: slack
      scopes: [channels:read, chat:write, users:read]
      tokenRef: oauth.slack.bot_token
baseUrls:
  default: https://slack.com/api
routing:
  nativePrefixes: [clawrouter-slack, slack]
  serviceParam: service
adapter:
  request: rest_json
  response: slack
  error: slack_error
capabilities:
  - id: tool.invoke
    endpoint: method
    methods: [GET, POST]
endpoints:
  method:
    path: /${method}
    pathParams: [method]
    requestFormat: slack.method
    responseFormat: slack.method
    timeoutMs: 120000
models:
  entries:
    - id: slack/method
      upstream: ${method}
      capabilities: [tool.invoke]
      pricingRef: slack-method
billing:
  meter: clawrouter.requests
  dimensions: [provider, endpoint, key, service, subject]


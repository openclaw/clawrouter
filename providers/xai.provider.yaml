schema: clawrouter.service-provider.v1
id: xai
displayName: xAI
status: stable
class: openai_compatible
service:
  platform: xai
  kind: model_provider
  upstreamService: xai
  configKeys: [XAI_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.x.ai
routing:
  nativePrefixes: [clawrouter-xai, xai]
  modelPrefixes: [xai/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: xai/grok-4.3
      upstream: grok-4.3
      capabilities: [llm.chat]
      pricingRef: xai-grok-4-3-standard-2026-06-21
      pricing:
        effectiveAt: "2026-06-21"
        source: https://api.x.ai/v1/models/grok-4.3
        inputMicrosPerMillion: 1250000
        cachedInputMicrosPerMillion: 200000
        outputMicrosPerMillion: 2500000
        maxInputTokens: 1000000
        defaultMaxOutputTokens: 131072
        longContext:
          thresholdInputTokens: 200000
          inputMicrosPerMillion: 2500000
          cachedInputMicrosPerMillion: 400000
          outputMicrosPerMillion: 5000000
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

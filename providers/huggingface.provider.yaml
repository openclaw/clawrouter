schema: clawrouter.service-provider.v1
id: huggingface
displayName: Hugging Face
status: stable
class: openai_compatible
service:
  platform: huggingface
  kind: model_provider
  upstreamService: inference
  configKeys: [HUGGINGFACE_API_TOKEN]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_token
baseUrls:
  default: https://router.huggingface.co
routing:
  nativePrefixes: [clawrouter-huggingface, huggingface]
  modelPrefixes: [huggingface/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: huggingface/gpt-oss-120b-fastest
      upstream: openai/gpt-oss-120b:fastest
      capabilities: [llm.chat]
      pricingRef: huggingface-router-dynamic
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

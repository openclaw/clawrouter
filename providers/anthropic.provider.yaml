schema: clawrouter.service-provider.v1
id: anthropic
displayName: Anthropic
status: stable
class: anthropic_compatible
service:
  platform: anthropic
  kind: model_provider
  upstreamService: anthropic
  configKeys: [ANTHROPIC_API_KEY]
auth:
  schemes:
    - type: api_key
      header: x-api-key
      secretKind: api_key
baseUrls:
  default: https://api.anthropic.com
routing:
  nativePrefixes: [clawrouter-anthropic, anthropic]
  modelPrefixes: [anthropic/]
adapter:
  request: anthropic
  response: anthropic
  stream: anthropic_sse
  error: anthropic_error
  passthroughHeaders: [anthropic-beta, anthropic-version]
  injectHeaders:
    anthropic-version: "2023-06-01"
quota:
  responseHeaders:
    - id: rpm
      kind: requests
      unit: request
      window: minute
      limitHeaders: [anthropic-ratelimit-requests-limit]
      remainingHeaders: [anthropic-ratelimit-requests-remaining]
      resetHeaders: [anthropic-ratelimit-requests-reset]
    - id: tpm
      kind: tokens
      unit: token
      window: minute
      limitHeaders: [anthropic-ratelimit-tokens-limit]
      remainingHeaders: [anthropic-ratelimit-tokens-remaining]
      resetHeaders: [anthropic-ratelimit-tokens-reset]
    - id: itpm
      kind: input_tokens
      unit: token
      window: minute
      limitHeaders: [anthropic-ratelimit-input-tokens-limit]
      remainingHeaders: [anthropic-ratelimit-input-tokens-remaining]
      resetHeaders: [anthropic-ratelimit-input-tokens-reset]
    - id: otpm
      kind: output_tokens
      unit: token
      window: minute
      limitHeaders: [anthropic-ratelimit-output-tokens-limit]
      remainingHeaders: [anthropic-ratelimit-output-tokens-remaining]
      resetHeaders: [anthropic-ratelimit-output-tokens-reset]
capabilities:
  - id: llm.messages
    endpoint: messages
    methods: [POST]
  - id: llm.count_tokens
    endpoint: count_tokens
    methods: [POST]
endpoints:
  messages:
    path: /v1/messages
    requestHeaders: [anthropic-beta, anthropic-version]
    requestFormat: anthropic.messages
    responseFormat: anthropic.messages
    streaming: sse
    timeoutMs: 600000
  count_tokens:
    path: /v1/messages/count_tokens
    requestHeaders: [anthropic-beta, anthropic-version]
    requestFormat: anthropic.messages
    responseFormat: anthropic.count_tokens
    timeoutMs: 120000
models:
  entries:
    - id: anthropic/claude-opus-4-8
      upstream: claude-opus-4-8
      capabilities: [llm.messages, llm.count_tokens]
      pricingRef: anthropic-claude-opus-4-8-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://platform.claude.com/docs/en/about-claude/pricing
        inputMicrosPerMillion: 5000000
        cachedInputMicrosPerMillion: 500000
        cacheWrite5mInputMicrosPerMillion: 6250000
        cacheWrite1hInputMicrosPerMillion: 10000000
        outputMicrosPerMillion: 25000000
        maxInputTokens: 1000000
        defaultMaxOutputTokens: 128000
    - id: anthropic/claude-sonnet-4-6
      upstream: claude-sonnet-4-6
      capabilities: [llm.messages, llm.count_tokens]
      pricingRef: anthropic-claude-sonnet-4-6-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://platform.claude.com/docs/en/about-claude/pricing
        inputMicrosPerMillion: 3000000
        cachedInputMicrosPerMillion: 300000
        cacheWrite5mInputMicrosPerMillion: 3750000
        cacheWrite1hInputMicrosPerMillion: 6000000
        outputMicrosPerMillion: 15000000
        maxInputTokens: 1000000
        defaultMaxOutputTokens: 64000
    - id: anthropic/claude-haiku-4-5
      upstream: claude-haiku-4-5
      capabilities: [llm.messages, llm.count_tokens]
      pricingRef: anthropic-claude-haiku-4-5-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://platform.claude.com/docs/en/about-claude/pricing
        inputMicrosPerMillion: 1000000
        cachedInputMicrosPerMillion: 100000
        cacheWrite5mInputMicrosPerMillion: 1250000
        cacheWrite1hInputMicrosPerMillion: 2000000
        outputMicrosPerMillion: 5000000
        maxInputTokens: 200000
        defaultMaxOutputTokens: 64000
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]
  counters:
    - name: input_tokens
      source: usage.input_tokens
      unit: token
    - name: output_tokens
      source: usage.output_tokens
      unit: token

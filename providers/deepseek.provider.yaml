schema: clawrouter.service-provider.v1
id: deepseek
displayName: DeepSeek
status: stable
class: openai_compatible
service:
  platform: deepseek
  kind: model_provider
  upstreamService: deepseek
  configKeys: [DEEPSEEK_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.deepseek.com
routing:
  nativePrefixes: [clawrouter-deepseek, deepseek]
  modelPrefixes: [deepseek/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: deepseek/default
      upstream: deepseek-chat
      capabilities: [llm.chat]
      pricingRef: deepseek-default
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]


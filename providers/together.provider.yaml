schema: clawrouter.service-provider.v1
id: together
displayName: Together AI
status: stable
class: openai_compatible
service:
  platform: together
  kind: model_provider
  upstreamService: together
  configKeys: [TOGETHER_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.together.xyz
routing:
  nativePrefixes: [clawrouter-together, together]
  modelPrefixes: [together/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: together/glm-5.2
      upstream: zai-org/GLM-5.2
      capabilities: [llm.chat]
      pricingRef: together-glm-5-2-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://docs.together.ai/docs/serverless/models
        inputMicrosPerMillion: 1400000
        cachedInputMicrosPerMillion: 260000
        outputMicrosPerMillion: 4400000
        maxInputTokens: 262144
        defaultMaxOutputTokens: 131072
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

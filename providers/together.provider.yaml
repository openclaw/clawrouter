schema: clawrouter.service-provider.v1
id: together
displayName: Together AI
status: stable
class: openai_compatible
service:
  platform: together
  kind: model_provider
  upstreamService: together
  configKeys: [TOGETHER_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.together.xyz
routing:
  nativePrefixes: [clawrouter-together, together]
  modelPrefixes: [together/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: together/default
      upstream: Qwen/Qwen2.5-7B-Instruct-Turbo
      capabilities: [llm.chat]
      pricingRef: together-qwen-2-5-7b-instruct-turbo-2026-06-21
      pricing:
        effectiveAt: "2026-06-21"
        source: https://www.together.ai/pricing
        inputMicrosPerMillion: 300000
        outputMicrosPerMillion: 300000
        maxInputTokens: 32768
        defaultMaxOutputTokens: 8192
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

schema: clawrouter.service-provider.v1
id: fireworks
displayName: Fireworks AI
status: stable
class: openai_compatible
service:
  platform: fireworks
  kind: model_provider
  upstreamService: fireworks
  configKeys: [FIREWORKS_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.fireworks.ai/inference
routing:
  nativePrefixes: [clawrouter-fireworks, fireworks]
  modelPrefixes: [fireworks/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
models:
  entries:
    - id: fireworks/glm-5.2
      upstream: accounts/fireworks/models/glm-5p2
      capabilities: [llm.chat]
      pricingRef: fireworks-glm-5p2-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://fireworks.ai/blog/glm-5p2
        inputMicrosPerMillion: 1400000
        cachedInputMicrosPerMillion: 260000
        outputMicrosPerMillion: 4400000
        maxInputTokens: 1048576
        defaultMaxOutputTokens: 131072
    - id: fireworks/gpt-oss-120b
      upstream: accounts/fireworks/models/gpt-oss-120b
      capabilities: [llm.chat]
      pricingRef: fireworks-gpt-oss-120b
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

schema: clawrouter.service-provider.v1
id: notion
displayName: Notion
status: experimental
class: oauth_rest_json
service:
  platform: notion
  kind: oauth_platform
  upstreamService: notion
  oauthProvider: notion
auth:
  schemes:
    - type: oauth
      provider: notion
      scopes: []
      tokenRef: oauth.notion.access_token
baseUrls:
  default: https://api.notion.com
routing:
  nativePrefixes: [clawrouter-notion, notion]
  serviceParam: service
adapter:
  request: rest_json
  response: notion
  error: notion_error
  injectHeaders:
    Notion-Version: "2022-06-28"
capabilities:
  - id: tool.invoke
    endpoint: rest
    methods: [GET, POST, PATCH]
endpoints:
  rest:
    path: /v1/${path}
    pathParams: [path]
    pathParamStyles:
      path: relative_path
    requestFormat: notion.rest
    responseFormat: notion.rest
    timeoutMs: 120000
models:
  entries:
    - id: notion/rest
      upstream: rest
      capabilities: [tool.invoke]
      pricingRef: notion-rest
billing:
  meter: clawrouter.requests
  dimensions: [provider, endpoint, key, service, subject]

schema: clawrouter.service-provider.v1
id: openai
displayName: OpenAI
status: stable
class: openai_compatible
service:
  platform: openai
  kind: model_provider
  upstreamService: openai
  configKeys: [OPENAI_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
  authorization:
    authorizeUrl: https://auth.openai.com/oauth/authorize
    tokenUrl: https://auth.openai.com/oauth/token
    clientId: app_EMoamEEZ73f0CkXaXp7hrann
    scopes: [openid, profile, email, offline_access]
    grantKind: subscription
    extraAuthorizeParams:
      id_token_add_organizations: "true"
      codex_cli_simplified_flow: "true"
      originator: clawrouter
    accountIdJsonPointer: /https:~1~1api.openai.com~1auth/chatgpt_account_id
    subscriptionPlanJsonPointer: /https:~1~1api.openai.com~1auth/chatgpt_plan_type
  refresh:
    tokenUrl: https://auth.openai.com/oauth/token
    clientId: app_EMoamEEZ73f0CkXaXp7hrann
  grantTransports:
    subscription:
      baseUrl: https://chatgpt.com/backend-api/codex
      endpointPaths:
        responses: /responses
      headers:
        ChatGPT-Account-ID: "${grant.accountId}"
        OpenAI-Beta: responses=experimental
        originator: clawrouter
baseUrls:
  default: https://api.openai.com
routing:
  nativePrefixes: [clawrouter-openai, openai]
  modelPrefixes: [openai/]
  baseUrlParam: base_url
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
  passthroughHeaders: [OpenAI-Organization, OpenAI-Project]
  requestTransforms:
    renameFields:
      - from: max_tokens
        to: max_completion_tokens
        paths: [/v1/chat/completions]
        upstreams: [gpt-5.6, gpt-5.5, gpt-5.4]
quota:
  responseHeaders:
    - id: rpm
      kind: requests
      unit: request
      window: minute
      limitHeaders: [x-ratelimit-limit-requests]
      remainingHeaders: [x-ratelimit-remaining-requests]
      resetHeaders: [x-ratelimit-reset-requests]
    - id: tpm
      kind: tokens
      unit: token
      window: minute
      limitHeaders: [x-ratelimit-limit-tokens]
      remainingHeaders: [x-ratelimit-remaining-tokens]
      resetHeaders: [x-ratelimit-reset-tokens]
    - id: subscription-primary
      kind: subscription
      unit: percent
      window: primary
      fixedLimit: 100
      usedHeaders: [x-codex-primary-used-percent]
      resetHeaders: [x-codex-primary-reset-at]
    - id: subscription-secondary
      kind: subscription
      unit: percent
      window: secondary
      fixedLimit: 100
      usedHeaders: [x-codex-secondary-used-percent]
      resetHeaders: [x-codex-secondary-reset-at]
    - id: credits
      kind: credits
      unit: credit
      remainingHeaders: [x-codex-credits-balance]
  probes:
    - grantKinds: [subscription]
      url: https://chatgpt.com/backend-api/wham/usage
      headers:
        ChatGPT-Account-ID: "${grant.accountId}"
        User-Agent: codex-cli
      windows:
        - id: subscription-primary
          kind: subscription
          unit: percent
          window: primary
          fixedLimit: 100
          usedPointer: /rate_limit/primary_window/used_percent
          resetPointer: /rate_limit/primary_window/reset_at
        - id: subscription-secondary
          kind: subscription
          unit: percent
          window: secondary
          fixedLimit: 100
          usedPointer: /rate_limit/secondary_window/used_percent
          resetPointer: /rate_limit/secondary_window/reset_at
        - id: credits
          kind: credits
          unit: credit
          remainingPointer: /credits/balance
capabilities:
  - id: llm.responses
    endpoint: responses
    methods: [POST]
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
  - id: llm.embeddings
    endpoint: embeddings
    methods: [POST]
endpoints:
  responses:
    path: /v1/responses
    requestHeaders: [session-id, thread-id, session_id, x-client-request-id]
    requestFormat: openai.responses
    responseFormat: openai.responses
    streaming: sse
    timeoutMs: 600000
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
  embeddings:
    path: /v1/embeddings
    requestFormat: openai.embeddings
    responseFormat: openai.embeddings
    timeoutMs: 120000
models:
  entries:
    - id: openai/gpt-5.6
      upstream: gpt-5.6
      capabilities: [llm.responses, llm.chat]
      pricingRef: openai-gpt-5.6-standard-2026-07-09
      pricing:
        effectiveAt: "2026-07-09"
        source: https://developers.openai.com/api/docs/models/gpt-5.6-sol
        inputMicrosPerMillion: 5000000
        cachedInputMicrosPerMillion: 500000
        cacheWriteInputMicrosPerMillion: 6250000
        outputMicrosPerMillion: 30000000
        maxInputTokens: 1050000
        defaultMaxOutputTokens: 128000
        longContext:
          thresholdInputTokens: 272000
          inputMicrosPerMillion: 10000000
          cachedInputMicrosPerMillion: 1000000
          cacheWriteInputMicrosPerMillion: 12500000
          outputMicrosPerMillion: 45000000
    - id: openai/gpt-5.5
      upstream: gpt-5.5
      capabilities: [llm.responses, llm.chat]
      pricingRef: openai-gpt-5.5-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://developers.openai.com/api/docs/models/gpt-5.5/
        inputMicrosPerMillion: 5000000
        cachedInputMicrosPerMillion: 500000
        outputMicrosPerMillion: 30000000
        maxInputTokens: 1050000
        defaultMaxOutputTokens: 128000
        longContext:
          thresholdInputTokens: 272000
          inputMicrosPerMillion: 10000000
          cachedInputMicrosPerMillion: 1000000
          outputMicrosPerMillion: 45000000
    - id: openai/gpt-4.1-mini
      upstream: gpt-4.1-mini
      capabilities: [llm.responses, llm.chat]
      pricingRef: openai-gpt-4.1-mini-standard-2026-06-19
      pricing:
        effectiveAt: "2026-06-19"
        source: https://platform.openai.com/docs/models/gpt-4.1-mini
        inputMicrosPerMillion: 400000
        cachedInputMicrosPerMillion: 100000
        outputMicrosPerMillion: 1600000
        maxInputTokens: 1047576
        defaultMaxOutputTokens: 32768
    - id: openai/gpt-5.4
      upstream: gpt-5.4
      capabilities: [llm.responses, llm.chat]
      pricingRef: openai-gpt-5.4-standard-2026-06-19
      pricing:
        effectiveAt: "2026-06-19"
        source: https://developers.openai.com/api/docs/models/gpt-5.4/
        inputMicrosPerMillion: 2500000
        cachedInputMicrosPerMillion: 250000
        outputMicrosPerMillion: 15000000
        maxInputTokens: 1050000
        defaultMaxOutputTokens: 128000
        longContext:
          thresholdInputTokens: 272000
          inputMicrosPerMillion: 5000000
          cachedInputMicrosPerMillion: 500000
          outputMicrosPerMillion: 22500000
    - id: openai/text-embedding-3-large
      upstream: text-embedding-3-large
      capabilities: [llm.embeddings]
      pricingRef: openai-text-embedding-3-large-standard-2026-06-19
      pricing:
        effectiveAt: "2026-06-19"
        source: https://platform.openai.com/docs/pricing
        inputMicrosPerMillion: 130000
        outputMicrosPerMillion: 0
        maxInputTokens: 8192
        maxRequestInputTokens: 300000
        defaultMaxOutputTokens: 0
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]
  counters:
    - name: input_tokens
      source: usage.input_tokens
      unit: token
    - name: output_tokens
      source: usage.output_tokens
      unit: token
tests:
  fixtures:
    - name: chat-basic
      request: providers/_fixtures/openai/chat-basic.request.json
      response: providers/_fixtures/openai/chat-basic.response.json

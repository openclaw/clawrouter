schema: clawrouter.service-provider.v1
id: mistral
displayName: Mistral AI
status: stable
class: openai_compatible
service:
  platform: mistral
  kind: model_provider
  upstreamService: mistral
  configKeys: [MISTRAL_API_KEY]
auth:
  schemes:
    - type: bearer
      header: Authorization
      format: "Bearer ${secret}"
      secretKind: api_key
baseUrls:
  default: https://api.mistral.ai
routing:
  nativePrefixes: [clawrouter-mistral, mistral]
  modelPrefixes: [mistral/]
adapter:
  request: openai
  response: openai
  stream: openai_sse
  error: openai_error
capabilities:
  - id: llm.chat
    endpoint: chat_completions
    methods: [POST]
  - id: llm.embeddings
    endpoint: embeddings
    methods: [POST]
endpoints:
  chat_completions:
    path: /v1/chat/completions
    requestFormat: openai.chat_completions
    responseFormat: openai.chat_completions
    streaming: sse
    timeoutMs: 600000
  embeddings:
    path: /v1/embeddings
    requestFormat: openai.embeddings
    responseFormat: openai.embeddings
    timeoutMs: 120000
models:
  entries:
    - id: mistral/mistral-medium-3-5
      upstream: mistral-medium-3-5
      capabilities: [llm.chat]
      pricingRef: mistral-medium-3-5-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://docs.mistral.ai/models/model-cards/mistral-medium-3-5-26-04
        inputMicrosPerMillion: 1500000
        outputMicrosPerMillion: 7500000
        maxInputTokens: 262144
        defaultMaxOutputTokens: 65536
    - id: mistral/mistral-small-2603
      upstream: mistral-small-2603
      capabilities: [llm.chat]
      pricingRef: mistral-small-4-standard-2026-06-22
      pricing:
        effectiveAt: "2026-06-22"
        source: https://docs.mistral.ai/getting-started/models/
        inputMicrosPerMillion: 150000
        outputMicrosPerMillion: 600000
        maxInputTokens: 262144
        defaultMaxOutputTokens: 65536
    - id: mistral/mistral-embed
      upstream: mistral-embed
      capabilities: [llm.embeddings]
      pricingRef: mistral-embed-23-12-standard-2026-06-21
      pricing:
        effectiveAt: "2026-06-21"
        source: https://docs.mistral.ai/models/mistral-embed-23-12
        inputMicrosPerMillion: 100000
        outputMicrosPerMillion: 0
        maxInputTokens: 8192
        defaultMaxOutputTokens: 0
billing:
  meter: clawrouter.tokens
  dimensions: [provider, model, key, service, subject]

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir admin check
      - run: pnpm --dir admin test
      - run: pnpm --dir admin build
      - run: pnpm --dir admin exec playwright install --with-deps chromium
      - run: pnpm --dir admin exec playwright test

  worker-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm worker:check
      - run: pnpm worker:e2e
      - run: pnpm provider:compile -- --output /tmp/provider-snapshot.json
      - run: pnpm test:scripts
      - run: pnpm provider:smoke-plan
      - run: CLAWROUTER_STRICT_CONFIG=0 pnpm cf:config
      - run: timeout 900s pnpm exec wrangler deploy --dry-run --outdir /tmp/clawrouter-worker-dry-run --config .wrangler.generated.toml
        timeout-minutes: 16
        env:
          WRANGLER_SEND_METRICS: "false"
